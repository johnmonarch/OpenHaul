version: 2

project_name: ohg

before:
  hooks:
    - go mod download

builds:
  - id: ohg
    main: ./cmd/ohg
    binary: ohg
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/openhaulguard/openhaulguard/internal/version.Version={{ .Version }} -X github.com/openhaulguard/openhaulguard/internal/version.Commit={{ .Commit }} -X github.com/openhaulguard/openhaulguard/internal/version.Date={{ .Date }}

archives:
  - id: ohg
    ids:
      - ohg
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - INSTALL.md
      - CLI_REFERENCE.md
      - CONFIGURATION.md
      - DATA_SOURCES.md
      - MCP.md

checksum:
  name_template: checksums.txt

release:
  extra_files:
    - glob: ./install.sh

nfpms:
  - id: ohg
    package_name: ohg
    vendor: OpenHaul Guard contributors
    homepage: https://github.com/johnmonarch/OpenHaul
    maintainer: OpenHaul Guard contributors
    description: Local-first carrier verification and freight risk review CLI.
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    contents:
      - src: ./README.md
        dst: /usr/share/doc/ohg/README.md
      - src: ./LICENSE
        dst: /usr/share/doc/ohg/LICENSE

brews:
  - name: ohg
    repository:
      owner: johnmonarch
      name: homebrew-openhaulguard
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/johnmonarch/OpenHaul
    description: Local-first carrier verification and freight risk review CLI.
    license: Apache-2.0
    install: |
      bin.install "ohg"
    test: |
      system "#{bin}/ohg", "--version"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
