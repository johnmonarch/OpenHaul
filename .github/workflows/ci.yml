name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: gofmt, test, build
    runs-on: ubuntu-latest
    env:
      GOCACHE: ${{ runner.temp }}/go-build
      GOMODCACHE: ${{ runner.temp }}/go/pkg/mod
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.x
          cache: false

      - name: Prepare Go cache directories
        run: mkdir -p "$GOCACHE" "$GOMODCACHE"

      - name: Check gofmt
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            printf 'The following files need gofmt:\n%s\n' "$files"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Build CLI
        run: go build -trimpath -o "${RUNNER_TEMP}/ohg" ./cmd/ohg
