name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".goreleaser.yaml"
      - ".github/workflows/release.yml"
      - "install.sh"
      - "INSTALL.md"
      - "README.md"
  pull_request:
    paths:
      - ".goreleaser.yaml"
      - ".github/workflows/release.yml"
      - "install.sh"
      - "INSTALL.md"
      - "README.md"
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Build a GoReleaser snapshot without publishing"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GOCACHE: /tmp/go-build
  GOMODCACHE: /tmp/go/pkg/mod

jobs:
  validate:
    name: Validate release config
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x
          cache: false

      - name: Prepare Go cache directories
        run: mkdir -p "$GOCACHE" "$GOMODCACHE"

      - name: Check installer syntax
        run: sh -n install.sh

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      - name: Build GoReleaser snapshot
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot }}
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish

  goreleaser:
    name: Publish release
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x
          cache: false

      - name: Prepare Go cache directories
        run: mkdir -p "$GOCACHE" "$GOMODCACHE"

      - name: Validate release tag and tap token
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if ! printf '%s' "$GITHUB_REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Release tags must use semantic version format like v0.1.0."
            exit 1
          fi

          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_GITHUB_TOKEN is required so GoReleaser can update johnmonarch/homebrew-openhaulguard."
            exit 1
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
