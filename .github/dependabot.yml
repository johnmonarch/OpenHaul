version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
